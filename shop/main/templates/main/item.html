{% extends 'main/base.html' %}

{% block content %}
<div class="item">
    <p>{{ item.name }}</p>
    <p>{{ item.description }}</p>
    <p>{{ item.price }} {{ item.currency.upper }}</p>
</div>
<form action="{% url 'cart_add' item.pk %}" method="post">
    {% csrf_token %}
    <button type="submit">Add to cart</button>
</form>
<button id="buy-from-item-button" data-item-id="{{ item.id }}">Buy</button>

{% include 'main/payment_form.html' %}

{% endblock %}
