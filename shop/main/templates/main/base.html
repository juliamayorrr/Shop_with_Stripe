{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'main/css/styles.css' %}">
    <title>{{ title }}</title>
</head>
<body>
    <div class="page_head">{{ title }}</div>
    {% if messages %}
        {% for message in messages %}
            <div>
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    {% block content %} {% endblock %}

</body>
</html>
